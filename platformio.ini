; PlatformIO Project Configuration File
;
; Структура: [env] + [flags_*] + [env:*]
; extra_scripts в [env:*] перезапписывает [env], а не дополняет,
; поэтому pre + post нужно указывать явно в каждом env.
;
; pio run -e esp32c3-super-mini-stage -t clean -t upload -t monitor

[platformio]
default_envs = esp32c3-prod, esp32c3-super-mini-prod, xiao-esp32s3-prod, waveshare-esp32s3-zero-prod

[env]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem114301
monitor_port = /dev/cu.usbmodem114301
monitor_speed = 115200
monitor_raw = yes
; v2 (idryer-core): компилируем только main_v2.cpp (старые IdryerDevice/WsServer excluded).
; lib_ignore: idryer-protocol конфликтует символами с idryer-core — исключаем.
build_src_filter = +<main_v2.cpp>
lib_ignore = idryer-protocol
lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^6.21.3
  densaugeo/base64 @ ^1.4.0
  https://github.com/jnthas/Improv-WiFi-Library.git
  links2004/WebSockets @ ^2.4.0

[flags_idryer]
build_flags =
  -DDEBUG_SERIAL=Serial
  -Iinclude

; USB CDC (нативный USB) — для super-mini, XIAO S3, Waveshare S3 Zero.
; Devkit ESP32-C3 (esp32c3-prod/-stage) использует UART через CH340/CP2102 — без CDC.
[flags_usb_cdc]
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

; PRODUCTION — боевой сервер
[flags_prod]
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DIDRYER_PORTAL_HOST=\"portal.idryer.org\"
  -DIDRYER_PORTAL_PORT=443
  -DIDRYER_PORTAL_USE_TLS=1
  -DIDRYER_API_BASE=\"https://portal.idryer.org/api\"
  -DIDRYER_SOCKET_PATH=\"/socket.io/?EIO=4\"
  -DMQTT_BROKER=\"mqtt.idryer.org\"
  -DMQTT_PORT=8883
  -DMQTT_USE_TLS=1

; STAGING — тестовый сервер
; MQTT: staging.idryer.org:1884 без TLS (nginx stream proxy → EMQX staging)
[flags_stage]
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DIDRYER_PORTAL_HOST=\"staging.idryer.org\"
  -DIDRYER_PORTAL_PORT=443
  -DIDRYER_PORTAL_USE_TLS=1
  -DIDRYER_API_BASE=\"https://staging.idryer.org/api\"
  -DIDRYER_SOCKET_PATH=\"/socket.io/?EIO=4\"
  -DMQTT_BROKER=\"staging.idryer.org\"
  -DMQTT_PORT=1884
  -DMQTT_USE_TLS=0

; LOCAL — локальный dev-сервер для тестирования миграции v2
[flags_local]
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DIDRYER_API_BASE=\"http://192.168.1.27:3000\"
  -DMQTT_BROKER=\"192.168.1.27\"
  -DMQTT_PORT=1883
  -DMQTT_USE_TLS=0

; =============================================================================
; ESP32-C3 DevKitM (UART через CH340/CP2102, без USB CDC)
; =============================================================================
[env:esp32c3-prod]
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/post_build.py
build_flags =
  ${flags_idryer.build_flags}
  ${flags_prod.build_flags}

[env:esp32c3-stage]
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/stage_auto_claim.py
build_flags =
  ${flags_idryer.build_flags}
  ${flags_stage.build_flags}

; =============================================================================
; ESP32-C3 Super Mini (нативный USB CDC)
; =============================================================================
[env:esp32c3-super-mini-prod]
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/post_build.py
build_flags =
  ${flags_idryer.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_prod.build_flags}

[env:esp32c3-super-mini-stage]
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/stage_auto_claim.py
build_flags =
  ${flags_idryer.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_stage.build_flags}

; Локальный сервер — без post_build и без auto_claim.
[env:esp32c3-super-mini-local]
extra_scripts =
  pre:extra_scripts/copy_menu.py
build_flags =
  ${flags_idryer.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_local.build_flags}

; v2 (idryer-core) — PRODUCTION (алиас esp32c3-super-mini-prod, оставлен для совместимости команд)
[env:esp32c3-super-mini-v2-prod]
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/post_build.py
build_flags =
  ${flags_idryer.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_prod.build_flags}

; =============================================================================
; Seeed Studio XIAO ESP32S3
; =============================================================================
[env:xiao-esp32s3-prod]
board = seeed_xiao_esp32s3
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/post_build.py
build_flags =
  ${flags_idryer.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_prod.build_flags}

[env:xiao-esp32s3-stage]
board = seeed_xiao_esp32s3
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/stage_auto_claim.py
build_flags =
  ${flags_idryer.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_stage.build_flags}

; =============================================================================
; Waveshare ESP32-S3-Zero
; Официального board ID нет — используем esp32-s3-devkitc-1 с поправками на 4MB flash.
; =============================================================================
[env:waveshare-esp32s3-zero-prod]
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
board_build.partitions = default.csv
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/post_build.py
build_flags =
  ${flags_idryer.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_prod.build_flags}

[env:waveshare-esp32s3-zero-stage]
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
board_build.partitions = default.csv
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/stage_auto_claim.py
build_flags =
  ${flags_idryer.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_stage.build_flags}
