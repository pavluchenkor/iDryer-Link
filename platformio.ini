; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; pio run -e esp32c3-super-mini-stage -t clean -t upload -t monitor
;
[platformio]
default_envs = esp32-c3-prod, esp32c3-super-mini-prod

; =============================================================================
; General settings for all environments
; =============================================================================
[env]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
board_build.filesystem = littlefs
upload_port = /dev/cu.usbmodem114301
monitor_port = /dev/cu.usbmodem114301
; upload_port = /dev/cu.usbserial-2110
; monitor_port = /dev/cu.usbserial-2110
monitor_speed = 115200
monitor_raw = yes
extra_scripts = pre:extra_scripts/copy_menu.py
; board_build.partitions = default.csv
; board_upload.erase_flash = yes
lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^6.21.3
  densaugeo/base64 @ ^1.4.0
  https://github.com/jnthas/Improv-WiFi-Library.git
  links2004/WebSockets @ ^2.4.0


; =============================================================================
; PRODUCTION - боевой сервер
; =============================================================================
[env:esp32-c3-prod]
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/copy_firmware.py
build_flags =
  -DDEBUG_SERIAL=Serial
  -DCORE_DEBUG_LEVEL=0
  -Iinclude
  -DIDRYER_PORTAL_HOST=\"portal.idryer.org\"
  -DIDRYER_PORTAL_PORT=443
  -DIDRYER_PORTAL_USE_TLS=1
  -DIDRYER_API_BASE=\"https://portal.idryer.org/api\"
  -DIDRYER_SOCKET_PATH=\"/socket.io/?EIO=4\"
  -DMQTT_BROKER=\"mqtt.idryer.org\"
  -DMQTT_PORT=8883
  -DMQTT_USE_TLS=1

; =============================================================================
; STAGING - тестовый сервер
; MQTT: порт 1884 без TLS (сертификат на mqtt.idryer.org, не на IP)
; =============================================================================
[env:esp32-c3-stage]
extra_scripts =
  pre:extra_scripts/copy_menu.py
build_flags =
  -DDEBUG_SERIAL=Serial
  -DCORE_DEBUG_LEVEL=3
  -Iinclude
  -DIDRYER_PORTAL_HOST=\"staging.idryer.org\"
  -DIDRYER_PORTAL_PORT=443
  -DIDRYER_PORTAL_USE_TLS=1
  -DIDRYER_API_BASE=\"https://staging.idryer.org/api\"
  -DIDRYER_SOCKET_PATH=\"/socket.io/?EIO=4\"
  -DMQTT_BROKER=\"82.146.63.133\"
  -DMQTT_PORT=1884
  -DMQTT_USE_TLS=0
  
[env:esp32c3-super-mini-prod]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/copy_firmware.py
build_flags =
  -DARDUINO_USB_MODE=1 
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DDEBUG_SERIAL=Serial
  -DCORE_DEBUG_LEVEL=0
  -Iinclude
  -DIDRYER_PORTAL_HOST=\"portal.idryer.org\"
  -DIDRYER_PORTAL_PORT=443
  -DIDRYER_PORTAL_USE_TLS=1
  -DIDRYER_API_BASE=\"https://portal.idryer.org/api\"
  -DIDRYER_SOCKET_PATH=\"/socket.io/?EIO=4\"
  -DMQTT_BROKER=\"mqtt.idryer.org\"
  -DMQTT_PORT=8883
  -DMQTT_USE_TLS=1
  ; -DMQTT_BROKER=\"mqtt.idryer.org\"
  ; -DMQTT_PORT=1883
  ; -DMQTT_USE_TLS=0


[env:esp32c3-super-mini-stage]
extra_scripts =
  pre:extra_scripts/copy_menu.py
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
build_flags =
  -DARDUINO_USB_MODE=1 
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DDEBUG_SERIAL=Serial
  -DCORE_DEBUG_LEVEL=3
  -Iinclude
  -DIDRYER_PORTAL_HOST=\"staging.idryer.org\"
  -DIDRYER_PORTAL_PORT=443
  -DIDRYER_PORTAL_USE_TLS=1
  -DIDRYER_API_BASE=\"https://staging.idryer.org/api\"
  -DIDRYER_SOCKET_PATH=\"/socket.io/?EIO=4\"
  -DMQTT_BROKER=\"82.146.63.133\"
  -DMQTT_PORT=1884
  -DMQTT_USE_TLS=0