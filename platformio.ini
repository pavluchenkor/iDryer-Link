; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; pio run -e esp32c3-super-mini-stage -t clean -t upload -t monitor
;
[platformio]
default_envs = esp32c3-prod, esp32c3-super-mini-prod, xiao-esp32s3-prod, waveshare-esp32s3-zero-prod

; =============================================================================
; v2 (idryer-core) — ЛОКАЛЬНЫЙ сервер, только для тестирования миграции.
; src_filter: компилируем только main_v2.cpp (старые IdryerDevice/WsServer excluded).
; lib_ignore: idryer-protocol конфликтует символами с idryer-core — исключаем.
; =============================================================================
[env:esp32c3-super-mini-local]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem114301
monitor_port = /dev/cu.usbmodem114301
monitor_speed = 115200
monitor_raw = yes
build_src_filter = +<main_v2.cpp>
lib_ignore = idryer-protocol
extra_scripts =
  pre:extra_scripts/copy_menu.py
lib_deps =
  bblanchon/ArduinoJson @ ^6.21.3
  knolleary/PubSubClient @ ^2.8
  densaugeo/base64 @ ^1.4.0
  https://github.com/jnthas/Improv-WiFi-Library.git
  links2004/WebSockets @ ^2.4.0
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DDEBUG_SERIAL=Serial
  -DCORE_DEBUG_LEVEL=3
  -Iinclude
  -DIDRYER_API_BASE=\"http://192.168.1.27:3000\"
  -DMQTT_BROKER=\"192.168.1.27\"
  -DMQTT_PORT=1883
  -DMQTT_USE_TLS=0

; =============================================================================
; General settings for all environments
; =============================================================================
[env]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
; board_build.filesystem = littlefs
upload_port = /dev/cu.usbmodem11301
monitor_port = /dev/cu.usbmodem11301
monitor_speed = 115200
monitor_raw = yes
extra_scripts = pre:extra_scripts/copy_menu.py
; board_build.partitions = default.csv
; board_upload.erase_flash = yes
build_src_filter = +<main_v2.cpp>
lib_ignore = idryer-protocol
lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^6.21.3
  densaugeo/base64 @ ^1.4.0
  https://github.com/jnthas/Improv-WiFi-Library.git
  links2004/WebSockets @ ^2.4.0


; =============================================================================
; PRODUCTION - боевой сервер
; =============================================================================
[env:esp32c3-prod]
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/post_build.py
build_flags =
  -DDEBUG_SERIAL=Serial
  -DCORE_DEBUG_LEVEL=0
  -Iinclude
  -DIDRYER_PORTAL_HOST=\"portal.idryer.org\"
  -DIDRYER_PORTAL_PORT=443
  -DIDRYER_PORTAL_USE_TLS=1
  -DIDRYER_API_BASE=\"https://portal.idryer.org/api\"
  -DIDRYER_SOCKET_PATH=\"/socket.io/?EIO=4\"
  -DMQTT_BROKER=\"mqtt.idryer.org\"
  -DMQTT_PORT=8883
  -DMQTT_USE_TLS=1

; =============================================================================
; STAGING - тестовый сервер
; MQTT: staging.idryer.org:1884 без TLS (nginx stream proxy → EMQX staging)
; =============================================================================
[env:esp32c3-stage]
extra_scripts =
  pre:extra_scripts/copy_menu.py
  post:extra_scripts/stage_auto_claim.py
build_flags =
  -DDEBUG_SERIAL=Serial
  -DCORE_DEBUG_LEVEL=3
  -Iinclude
  -DIDRYER_PORTAL_HOST=\"staging.idryer.org\"
  -DIDRYER_PORTAL_PORT=443
  -DIDRYER_PORTAL_USE_TLS=1
  -DIDRYER_API_BASE=\"https://staging.idryer.org/api\"
  -DIDRYER_SOCKET_PATH=\"/socket.io/?EIO=4\"
  -DMQTT_BROKER=\"staging.idryer.org\"
  -DMQTT_PORT=1884
  -DMQTT_USE_TLS=0
  
