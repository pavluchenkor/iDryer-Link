# Fake Bambu MQTT broker.
# Bambu printer = TLS-MQTT на 8883, user="bblp", pass=lanAccessCode.
# ESP делает setInsecure() → self-signed cert OK.
# allow_anonymous пропускает любые credentials — упрощение для теста.

listener 8883 0.0.0.0
allow_anonymous true

cafile   cert.pem
certfile cert.pem
keyfile  key.pem

# Не требуем клиентский сертификат.
require_certificate false

log_type all
log_dest stdout
